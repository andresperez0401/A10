services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "dev-secret-change-me"
      FRONTEND_ORIGIN: "http://localhost:5173"
      PORT: "4000"
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:4000"
    depends_on:
      - api
